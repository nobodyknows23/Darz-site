<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - Darz Wallah</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background:#f0f9ff;
            font-family:sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<nav class="bg-sky-500 text-white p-4 shadow-lg">
    <h1 class="text-center text-xl font-bold">Lectures</h1>
</nav>

<div id="contentContainer" class="flex-grow p-4">
    <div class="text-center mt-20 text-sky-600 font-bold">
        Loading lectures...
    </div>
</div>

<footer class="p-4 text-center bg-white border-t">
    Developed by Unknown
</footer>

<script>

const params=new URLSearchParams(location.search);

const batchId=params.get("batchId");
const subjectId=params.get("subjectId");
const tag=params.get("tag");

async function loadContent(){

    const container=document.getElementById("contentContainer");

    if(!batchId || !subjectId){

        container.innerHTML="<p class='text-center text-red-500'>Missing batchId or subjectId</p>";
        return;
    }

    const url=
    `https://darzwallah-playerv1.vercel.app/api/lectures?`+
    `batchId=${encodeURIComponent(batchId)}`+
    `&subjectId=${encodeURIComponent(subjectId)}`+
    `&contentType=videos`+
    `&tag=${encodeURIComponent(tag||"")}`+
    `&page=1`;

    console.log(url);

    try{

        const res=await fetch(url);
        const json=await res.json();

        console.log(json);

        const lectures=json.data || [];

        if(!lectures.length){

            container.innerHTML="<p class='text-center mt-10 text-sky-600'>No lectures found.</p>";
            return;
        }

        container.innerHTML=lectures.map(item=>`

        <div
        class="bg-white rounded-2xl shadow-md border border-sky-100 mb-4 p-4 cursor-pointer hover:bg-sky-50 transition"
        onclick="openPlayer('${item._id}')">

            <div class="flex gap-4">

                <img
                src="${item.videoDetails?.image || ''}"
                class="w-24 h-16 rounded-xl object-cover">

                <div class="flex-1">

                    <h2 class="font-bold text-sky-900">
                        ${item.topic}
                    </h2>

                    <p class="text-xs text-gray-500 mt-2">
                        ${item.videoDetails?.duration || ""}
                    </p>

                </div>

            </div>

        </div>

        `).join("");

    }catch(err){

        console.error(err);

        container.innerHTML="<p class='text-center text-red-500 mt-10'>Failed to load lectures.</p>";

    }

}

function openPlayer(id){

    window.location.href=`player.html?videoId=${id}`;

}

loadContent();

</script>

</body>
</html>
