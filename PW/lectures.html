<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; display: flex; align-items: center; gap: 16px; }
        .tab-btn { background: #ffffff; color: #475569; border: 1px solid #e2e8f0; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 30px; cursor: pointer; }
        .tab-btn.active { background: #4f46e5; color: #ffffff; border-color: #4f46e5; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body class="pb-20">
    <nav class="h-16 bg-[#4f46e5] flex items-center px-6 text-white font-bold shadow-lg">
        <button onclick="history.back()" class="mr-4">← Back</button>
        <span id="pageTitle">The DevCoderZ</span>
    </nav>

    <div class="max-w-[600px] mx-auto p-4">
        <h3 class="text-lg font-bold text-slate-800 mb-2" id="topicHeading">Loading...</h3>
        <p class="text-xs text-slate-500 mb-4" id="topicSub">Initializing...</p>
        
        <div class="flex gap-2 overflow-x-auto pb-4 mb-2" id="tabsContainer">
            <button class="tab-btn active" data-tab="lectures">Lectures</button>
            <button class="tab-btn" data-tab="notes">Notes</button>
            <button class="tab-btn" data-tab="dppVideos">DPP Sol</button>
            <button class="tab-btn" data-tab="dppQuiz">Quiz</button>
        </div>

        <div id="contentArea"></div>
    </div>

    <script>
        const BASE_URL = "https://mtaiirus-api.onrender.com";
        const params = new URLSearchParams(window.location.search);
        
        // App State
        let activeTab = "lectures";
        const cache = { lectures: null, notes: null, dppVideos: null, dppQuiz: null };

        // DOM
        const contentArea = document.getElementById("contentArea");

        // Decryption & Fetching
        async function importAesKey(keyText) {
            const input = new TextEncoder().encode(keyText);
            const fixed = new Uint8Array(32);
            for (let i = 0; i < 32; i++) fixed[i] = i < input.length ? input[i] : 0;
            return crypto.subtle.importKey("raw", fixed, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
        }

        async function decryptPayload(payload) {
            try {
                const [ivHex, dataHex] = String(payload).split(":");
                const iv = new Uint8Array(ivHex.match(/.{1,2}/g).map(x => parseInt(x, 16)));
                const encrypted = new Uint8Array(dataHex.match(/.{1,2}/g).map(x => parseInt(x, 16)));
                const key = await importAesKey("maggikhalo");
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, encrypted);
                return JSON.parse(new TextDecoder().decode(decrypted));
            } catch (err) { return { success: false }; }
        }

        async function fetchContent(tab) {
            contentArea.innerHTML = '<div class="loading">Loading content...</div>';
            const bId = params.get("batch_id");
            const sId = params.get("subject_id");
            const tId = params.get("topic_id");
            
            let contentType = tab === "lectures" ? "videos" : (tab === "dppVideos" ? "dppVideos" : (tab === "dppQuiz" ? "DPP_QUIZ" : "notes"));
            
            try {
                const res = await fetch(`${BASE_URL}/api/pw/datacontent?batchId=${bId}&subjectSlug=${sId}&topicSlug=${tId}&contentType=${contentType}`);
                const json = await res.json();
                const decrypted = await decryptPayload(json.data);
                
                renderItems(decrypted.data || []);
            } catch (e) {
                contentArea.innerHTML = '<div class="loading">Error loading content.</div>';
            }
        }

        function renderItems(items) {
            if (!items.length) { contentArea.innerHTML = '<div class="loading">No items found.</div>'; return; }
            
            contentArea.innerHTML = items.map(item => `
                <div class="card">
                    <div class="img-box w-16 h-12 bg-indigo-50 rounded flex items-center justify-center text-xl">
                        ${activeTab.includes('lectures') ? '▶️' : '📄'}
                    </div>
                    <div class="flex-grow">
                        <div class="font-bold text-sm text-slate-800">${item.topic || item.name}</div>
                        <div class="text-xs text-slate-500">${item.duration || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        // Tab Switching
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                e.target.classList.add("active");
                activeTab = e.target.dataset.tab;
                fetchContent(activeTab);
            });
        });

        // Init
        fetchContent("lectures");
    </script>
</body>
</html>
