<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - Devansh Sharma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-sky-500 p-4 text-white shadow-lg">
        <h1 class="text-xl font-bold text-center">Lectures</h1>
    </nav>

    <div id="contentContainer" class="p-4 flex-grow">
        <div class="text-center mt-20 text-sky-600 font-bold">Loading content...</div>
    </div>

    <footer class="p-4 text-center text-sky-700 font-semibold text-sm bg-white border-t border-sky-100">
        Developed by Devansh Sharma
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batchId");
        const sId = params.get("subjectId");
        const tId = params.get("tag");

        async function loadContent() {
            const container = document.getElementById('contentContainer');
            try {
                const u = `https://devcoderz-pw.vercel.app/api/PW/all-batches-api4.js?batchId=${bId}&subjectId=${sId}&contentType=videos&tag=${tId || ''}`;
                const res = await fetch(u);
                const json = await res.json();
                
                if (json.data && json.data.length > 0) {
                    container.innerHTML = json.data.map(i => `
                        <div class="bg-white p-4 mb-3 rounded-2xl shadow-md border border-sky-100 flex items-center gap-4">
                            ${i.videoDetails?.image ? `<img src="${i.videoDetails.image}" class="w-20 h-16 rounded-xl object-cover shadow-sm">` : ''}
                            <p class="font-bold text-sky-900 text-sm">${i.topic || i.videoDetails?.name || "Untitled"}</p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-center mt-10 text-sky-500">No content found</p>';
                }
            } catch (e) {
                container.innerHTML = '<p class="text-center mt-10 text-red-500">Error loading data.</p>';
            }
        }
        loadContent();
    </script>
</body>
</html>
