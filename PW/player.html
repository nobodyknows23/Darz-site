<!DOCTYPE html>
<html>
<head>
    <title>Video Streamer</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #video { width: 100%; height: 80vh; }
        .controls { padding: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #5a4bda; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <video id="video" controls></video>
    <div class="controls">
        <button onclick="downloadVideo()">Download Video</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const player = new shaka.Player(video);

        async function initPlayer() {
            try {
                // 1. Fetch APIs (Ye wahi endpoints hain jo aapke proxy/app use karti hai)
                const vidRes = await fetch('/api/proxy?endpoint=video-url-details').then(r => r.json());
                const keyRes = await fetch('/api/proxy?endpoint=datacontent').then(r => r.json());
                
                const manifestUrl = vidRes.data[0].url;
                const keys = JSON.parse(atob(keyRes.data)); // Decoding data

                // 2. Setup DRM/ClearKeys
                player.configure({
                    drm: { clearKeys: { [keys.keyid]: keys.key } }
                });

                // 3. Load Video
                await player.load(manifestUrl);
            } catch (e) {
                console.error("Error:", e);
            }
        }

        async function downloadVideo() {
            alert("Download process started. Please check console for progress.");
            // Yahan par aap 'ffmpeg.wasm' ya 'MediaRecorder' API ka use karke 
            // blob ko mp4 mein convert kar sakte hain.
            // Direct download ke liye blob URL use hota hai:
            const link = document.createElement('a');
            link.href = video.src;
            link.download = 'lecture.mp4';
            link.click();
        }

        initPlayer();
    </script>
</body>
</html>
