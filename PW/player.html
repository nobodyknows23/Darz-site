<!DOCTYPE html>
<html>
<head>
    <title>Secure Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <style>
        body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; }
        .video-container { width:100%; max-width:900px; }
        video { width:100%; }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" controls playsinline></video>
    </div>

    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const vId = params.get('video_id'), bId = params.get('batch_id'), sId = params.get('subject_id');
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            try {
                // 1. Parallel fetch: Video URL aur Datacontent (Keys)
                const [vidRes, dataRes] = await Promise.all([
                    fetch(`/api/proxy?endpoint=video-url-details&batchId=${bId}&childId=${vId}&subjectId=${sId}`).then(r => r.json()),
                    fetch(`/api/proxy?endpoint=datacontent&batchId=${bId}&subjectSlug=none&topicSlug=none&contentType=videos`).then(r => r.json())
                ]);

                const manifestUrl = vidRes.data[0].url;
                
                // 2. Keys Decrypt/Parse karna
                // Agar data Base64 encoded hai toh 'atob' use hoga, else direct access
                let keys = dataRes.data;
                if (typeof keys === 'string') {
                    // Agar string hai toh decode karke JSON parse karein
                    keys = JSON.parse(atob(keys));
                }

                // 3. DRM Configuration (ClearKeys)
                if (keys && keys.keyid && keys.key) {
                    player.configure({
                        drm: {
                            clearKeys: {
                                [keys.keyid]: keys.key
                            }
                        }
                    });
                }

                // 4. Request Filter (Headers injection)
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers["Referer"] = "https://www.pw.live/";
                    if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                        const mUrl = new URL(manifestUrl);
                        const sUrl = new URL(request.uris[0]);
                        mUrl.searchParams.forEach((v, k) => sUrl.searchParams.set(k, v));
                        request.uris[0] = sUrl.toString();
                    }
                });

                // 5. Load Video
                await player.load(manifestUrl);
                new Plyr(video);

            } catch (e) {
                console.error("Player Load Error:", e);
                alert("Video Load failed. Check console.");
            }
        })();
    </script>
</body>
</html>
