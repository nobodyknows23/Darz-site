<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Lecture Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 100%; max-width: 900px; }
        .attachment-btn { display: block; margin-top: 15px; color: #fff; text-decoration: none; padding: 10px; background: #4f46e5; border-radius: 5px; }
    </style>
</head>
<body>
    <div style="width:100%; max-width:900px;">
        <video id="video" controls crossorigin playsinline></video>
        <a id="attachment-link" class="attachment-btn" style="display:none;" target="_blank">Download Notes</a>
    </div>

    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const vId = params.get('video_id'), bId = params.get('batch_id'), sId = params.get('subject_id'), kid = params.get('kid');
            const video = document.getElementById('video');

            try {
                // Teeno APIs ko ek saath call kar rahe hain
                const [otpRes, keyRes, vidRes, attRes] = await Promise.all([
                    fetch(`/api/proxy?endpoint=otp&kid=${kid}`).then(r => r.json()),
                    fetch(`/api/proxy?endpoint=datacontent&batchId=${bId}&subjectSlug=none&topicSlug=none&contentType=videos`).then(r => r.json()),
                    fetch(`/api/proxy?endpoint=video-url-details&batchId=${bId}&childId=${vId}&subjectId=${sId}`).then(r => r.json()),
                    fetch(`/api/proxy?endpoint=attachments-url&BatchId=${bId}&SubjectId=${sId}&ContentId=${vId}`).then(r => r.json())
                ]);

                // Attachments handle karein
                if (attRes.success && attRes.data?.length > 0) {
                    const attLink = document.getElementById('attachment-link');
                    attLink.href = attRes.data[0].url;
                    attLink.style.display = 'block';
                }

                const manifestUrl = vidRes.data[0].url;
                const accessKey = keyRes.data || "";

                if (Hls.isSupported()) {
                    const hls = new Hls({
                        xhrSetup: function(xhr, url) {
                            if(accessKey) xhr.setRequestHeader('Authorization', accessKey);
                            xhr.setRequestHeader('Referer', 'https://www.pw.live/');
                        }
                    });
                    hls.loadSource(manifestUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else {
                    video.src = manifestUrl;
                }
                new Plyr(video);
            } catch (e) {
                console.error("Error:", e);
            }
        })();
    </script>
</body>
</html>
