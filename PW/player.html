<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Lecture Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        #video { width: 100%; border-radius: 8px; background: #000; }
        .controls { margin-top: 20px; padding: 20px; background: #1a1a1a; border-radius: 8px; }
        .btn { background: #5a4bda; border: none; color: white; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .log { margin-top: 15px; background: #000; padding: 10px; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; color: #0f0; }
    </style>
</head>
<body>

<div class="container">
    <video id="video" controls></video>
    
    <div class="controls">
        <h2 style="margin-top:0">Lecture Downloader</h2>
        <button class="btn" onclick="startDownload()">Load & Download Segments</button>
        <div id="log" class="log">--- System Ready ---</div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const logEl = document.getElementById('log');

    function log(msg) { logEl.innerHTML += `<br>> ${msg}`; }

    async function startDownload() {
        log("Fetching video details...");
        try {
            // 1. Fetching API Data
            const vidRes = await fetch('/api/proxy?endpoint=video-url-details').then(r => r.json());
            const keyRes = await fetch('/api/proxy?endpoint=datacontent').then(r => r.json());
            
            const manifestUrl = vidRes.data[0].url;
            const keys = JSON.parse(atob(keyRes.data));

            log("Keys acquired. Initializing Player...");

            // 2. Shaka Player Setup
            const player = new shaka.Player(video);
            player.configure({
                drm: { clearKeys: { [keys.keyid]: keys.key } }
            });

            await player.load(manifestUrl);
            log("Video loaded successfully!");
            log("Download process triggered via browser buffer...");

        } catch (e) {
            log("ERROR: " + e.message);
        }
    }
</script>
</body>
</html>
