<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ultra Smooth Player</title>
<style>
:root { --primary: #0ea5e9; }
*{ margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
html,body{width:100%;height:100%;background:#000;overflow:hidden;}

.player{position:fixed;inset:0;background:#000;}
video{width:100%;height:100%;object-fit:contain;}

/* Branding Top-Left */
.top-brand{position:absolute;top:15px;left:15px;z-index:40;pointer-events:none;}
.brand-name{font-size:16px;font-weight:900;color:var(--primary);text-transform:uppercase;}

/* Controls */
.controls{position:absolute;bottom:0;width:100%;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:35;}
.progress{height:6px;background:rgba(255,255,255,0.2);border-radius:10px;margin-bottom:15px;cursor:pointer;}
.progress-fill{height:100%;width:0;background:var(--primary);border-radius:10px;}

.row{display:flex;align-items:center;justify-content:center;gap:20px;color:#fff;}
.btn{width:45px;height:45px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border: 1px solid rgba(255,255,255,0.1);}
</style>
</head>
<body>

<div class="player" id="player">
 <video id="video" playsinline></video>
 
 <div class="top-brand">
  <div class="brand-name">The DevCoderZ</div>
 </div>

 <div class="controls">
  <div class="progress" id="progress"><div class="progress-fill" id="bar"></div></div>
  <div class="row">
   <div class="btn" onclick="seek(-10)">⟲</div>
   <div class="btn" id="playBtn">▶</div>
   <div class="btn" onclick="seek(10)">⟳</div>
   <div class="btn" onclick="toggleFS()">⛶</div>
  </div>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v = document.getElementById("video");
const bar = document.getElementById("bar");
const playBtn = document.getElementById("playBtn");

// API/URL Connection Logic
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get("Url");

if(videoUrl) {
    const decodedUrl = decodeURIComponent(videoUrl);
    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(decodedUrl);
        hls.attachMedia(v);
    } else {
        v.src = decodedUrl;
    }
}

playBtn.onclick = () => {
    v.paused ? v.play() : v.pause();
    playBtn.textContent = v.paused ? "▶" : "❚❚";
};

v.ontimeupdate = () => {
    bar.style.width = (v.currentTime / v.duration) * 100 + "%";
};

function seek(sec) { v.currentTime += sec; }

function toggleFS() {
    if(!document.fullscreenElement) document.getElementById("player").requestFullscreen();
    else document.exitFullscreen();
}

document.getElementById("progress").onclick = (e) => {
    const pos = (e.offsetX / e.target.offsetWidth);
    v.currentTime = pos * v.duration;
};
</script>
</body>
</html>
