<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh} .video-container{width:100%;max-width:900px} video{width:100%}</style>
</head>
<body>
<div class="video-container"><video id="player" playsinline controls></video></div>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
(async function() {
    const params = new URLSearchParams(window.location.search);
    const vId = params.get('video_id'), bId = params.get('batch_id'), sId = params.get('subject_id');

    try {
        // 1. Fetch Video URL
        const vidRes = await fetch(`/api/proxy?endpoint=video-url-details&batchId=${bId}&childId=${vId}&subjectId=${sId}`).then(r => r.json());
        const manifestUrl = vidRes.data[0].url;

        // 2. Fetch Key (Agar slug nahi hai toh khali chhod de)
        const keyRes = await fetch(`/api/proxy?endpoint=datacontent&batchId=${bId}&subjectSlug=none&topicSlug=none&contentType=videos`).then(r => r.json());
        const accessKey = keyRes.data || "";

        const videoEl = document.getElementById('player');
        const player = new shaka.Player(videoEl);

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if(accessKey) request.headers["Authorization"] = accessKey;
            request.headers["Referer"] = "https://www.pw.live/";
            if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                const mUrl = new URL(manifestUrl);
                const sUrl = new URL(request.uris[0]);
                mUrl.searchParams.forEach((v, k) => sUrl.searchParams.set(k, v));
                request.uris[0] = sUrl.toString();
            }
        });

        await player.load(manifestUrl);
        new Plyr(videoEl);
    } catch (e) { console.error("Critical Error:", e); }
})();
</script>
</body>
</html>
