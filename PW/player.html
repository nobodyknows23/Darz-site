<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">PW Lecture - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
        #shell { width:100%; height:100vh; position:relative; }
        .loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; text-align:center; }
    </style>
</head>
<body>

<div id="shell">
    <!-- Player will be initialized by player.js -->
</div>

<!-- Hidden fields required by player.js -->
<input type="hidden" id="data-video-id" value="">
<input type="hidden" id="data-batch-id" value="">
<input type="hidden" id="data-subject-id" value="">
<input type="hidden" id="data-title" value="">

<script src="player.js"></script>

<script>
    // Get parameters from URL
    const params = new URLSearchParams(window.location.search);
    
    const videoId   = params.get('video_id') || params.get('videoId') || '';
    const batchId   = params.get('batch_id') || params.get('batchId') || '';
    const subjectId = params.get('subject_id') || params.get('subjectId') || '';
    const title     = params.get('title') || params.get('chapterName') || 'PW Lecture';

    // Set hidden fields for player.js
    document.getElementById('data-video-id').value = videoId;
    document.getElementById('data-batch-id').value = batchId;
    document.getElementById('data-subject-id').value = subjectId;
    document.getElementById('data-title').value = decodeURIComponent(title);

    document.getElementById('pageTitle').textContent = decodeURIComponent(title);

    // Auto start player
    console.log('🚀 Starting player with:', {videoId, batchId, subjectId, title});
</script>

</body>
</html>
