<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
</head>
<body>
    <video id="video" controls autoplay style="width:100%"></video>

    <script>
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const params = new URLSearchParams(window.location.search);

        async function init() {
            try {
                // 1. Fetch Metadata (Manifest URL ke liye)
                const metaRes = await fetch(`/api/proxy?endpoint=datacontent&batchId=${params.get('batchId')}&subjectSlug=${params.get('subjectSlug')}&topicSlug=${params.get('topicSlug')}&contentType=videos`);
                const meta = await metaRes.json();
                const videoUrl = meta.data[0].videoUrl; // Yahan structure check kar lein
                const kid = meta.data[0].keyid;

                // 2. Fetch Decryption Key
                const keyRes = await fetch(`/api/proxy?endpoint=otp&kid=${kid}`);
                const keyData = await keyRes.json();

                // 3. Configure Player
                player.configure({
                    drm: { clearKeys: { [kid]: keyData.key } }
                });

                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers['Referer'] = 'https://pw.live/';
                });

                await player.load(videoUrl);
                console.log("Stream Playing...");
            } catch (e) {
                console.error("Setup Failed:", e);
                alert("Error: Check console for missing IDs or API response");
            }
        }
        init();
    </script>
</body>
</html>
