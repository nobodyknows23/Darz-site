<!DOCTYPE html>
<html lang="hi" style="user-select: none;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mtaiirus Player</title>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
  <style>
    :root { --accent: #0ea5e9; --accentl: #7dd3fc; }
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    #player-container { width: 100vw; height: 100vh; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; }
    
    /* Branding */
    .branding { position: absolute; top: 15px; left: 15px; font-size: 8px; font-weight: 800; color: var(--accentl); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; opacity: 0.7; z-index: 10; }

    /* Footer & Progress */
    .footer { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, #000); z-index: 20; }
    .time-display { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
    .progress-bar { width: 100%; height: 6px; background: #333; cursor: pointer; position: relative; border-radius: 3px; }
    .progress-played { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; position: relative; }
    .thumb { position: absolute; right: -6px; top: -3px; width: 12px; height: 12px; background: var(--accentl); border-radius: 50%; }

    /* Controls */
    .controls { display: flex; gap: 15px; margin-top: 15px; }
    button { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
    
    /* Double Tap Layer */
    .tap-layer { position: absolute; inset: 0; display: flex; z-index: 5; }
    .tap-box { flex: 1; }
  </style>
</head>
<body>

<div id="player-container">
  <video id="video" playsinline></video>
  <div class="branding">DEVELOPED BY DEVANSH SHARMA</div>
  
  <div class="tap-layer">
    <div class="tap-box" onclick="seek(-10)"></div>
    <div class="tap-box" onclick="seek(10)"></div>
  </div>

  <div class="footer">
    <div class="time-display"><span id="cur">00:00:00</span><span id="dur">00:00:00</span></div>
    <div id="progressBar" class="progress-bar">
      <div id="progressPlayed" class="progress-played"><div class="thumb"></div></div>
    </div>
    <div class="controls">
      <button onclick="togglePlay()" id="playBtn">Play/Pause</button>
      <button onclick="toggleFS()">Full Screen</button>
      <button onclick="download()">Download</button>
      <button onclick="alert('Attachments')">📎</button>
      <button onclick="alert('Settings')">⚙️</button>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  // Time format
  function fmt(s) {
    return new Date(s * 1000).toISOString().substr(11, 8);
  }

  // Smooth Progress
  video.ontimeupdate = () => {
    let pct = (video.currentTime / video.duration) * 100;
    document.getElementById('progressPlayed').style.width = pct + '%';
    document.getElementById('cur').innerText = fmt(video.currentTime);
    document.getElementById('dur').innerText = fmt(video.duration || 0);
  };

  // Double Tap & Seek
  function seek(sec) { video.currentTime += sec; }
  function togglePlay() { video.paused ? video.play() : video.pause(); }
  function toggleFS() { !document.fullscreenElement ? document.documentElement.requestFullscreen() : document.exitFullscreen(); }
  
  // Progress Drag
  document.getElementById('progressBar').onpointerdown = (e) => {
    let rect = e.target.getBoundingClientRect();
    video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
  };
</script>
<script src="/PW/player.js"></script>
</body>
</html>
