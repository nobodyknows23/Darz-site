<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
    <style>body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; } video { width:100%; max-width:800px; }</style>
</head>
<body>
    <video id="video" controls autoplay></video>

    <script>
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        
        // URL se params nikalne ke liye
        const params = new URLSearchParams(window.location.search);
        const batchId = params.get('batchId');
        const subjectId = params.get('subjectId');
        const contentId = params.get('contentId');

        async function init() {
            try {
                // IDs check karein
                if(!batchId || !contentId) throw new Error("Missing IDs in URL");

                // Dynamic API Calls
                const [vidRes, keyRes] = await Promise.all([
                    fetch(`/api/proxy?endpoint=attachments-url&BatchId=${batchId}&SubjectId=${subjectId}&ContentId=${contentId}`).then(r => r.json()),
                    fetch(`/api/proxy?endpoint=datacontent&batchId=${batchId}&contentType=videos`).then(r => r.json())
                ]);

                player.configure({
                    drm: { clearKeys: { [keyRes.keyid]: keyRes.key } }
                });

                await player.load(vidRes.url);
            } catch (e) {
                console.error("Player Error:", e);
                alert("Error loading video: " + e.message);
            }
        }
        init();
    </script>
</body>
</html>
