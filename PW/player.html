<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DevCoderZ Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #0ea5e9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; overflow: hidden; }
        
        #player { position: fixed; inset: 0; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Branding Top-Left */
        .brand { position: absolute; top: 15px; left: 15px; z-index: 10; color: var(--primary); font-weight: 900; font-size: 16px; pointer-events: none; text-transform: uppercase; }

        /* Controls Bottom */
        .controls { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 10; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
        #bar { height: 100%; width: 0%; background: var(--primary); border-radius: 4px; }
        
        .buttons { display: flex; justify-content: center; gap: 25px; color: #fff; }
        .btn { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="player">
        <video id="video" playsinline></video>
        <div class="brand">The DevCoderZ</div>
