<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="theme-color" content="#4f46e5">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darz Wallah - Classroom</title>
    
      <link rel="stylesheet" href="style.css">
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
</head>
<body>
    <div class="header">Darz Wallah <span>PW</span></div>
    <div class="search-section"><input id="searchInput" class="search-box" placeholder="Search batches..."></div>
    <div class="tab-nav">
      <button class="tab-btn active" id="totalTab">Total</button>
      <button class="tab-btn" id="favTab">Favourites</button>
    </div>
    <div class="content">
      <div id="total" class="grid"></div>
      <div id="fav" class="grid" style="display: none"></div>
    </div>
    <div class="app-footer">Developed by - <span>Unknown</span></div>
    <script>
      const FALLBACK_IMG = "https://devcoderz.vercel.app/pw.png";
      let ALL = [], filtered = [], favs = JSON.parse(localStorage.getItem("favs") || "[]"), cachedBatches = JSON.parse(localStorage.getItem("fav_batches") || "{}");
      const total = document.getElementById("total"), fav = document.getElementById("fav"), content = document.querySelector(".content"), totalTab = document.getElementById("totalTab"), favTab = document.getElementById("favTab");
      let loaded = 0, LIMIT = 8, loading = false;
      function showSkeleton() {
        total.innerHTML = Array(6).fill(`<div class="skeleton"><div class="skel skel-title"></div><div class="skel skel-img"></div><div class="skel skel-text"></div><div class="skel skel-btn"></div></div>`).join("");
      }
      showSkeleton();
      fetch("/api/PW/all-batches-api1.js").then(r => r.json()).then(d => { ALL = d.batches || d.data?.batches || d.data || []; filtered = ALL; loadMore(true); }).catch(() => { ALL = Object.values(cachedBatches); filtered = ALL; if(ALL.length) loadMore(true); else total.innerHTML = `<div class="empty">Failed to load</div>`; });
      function card(b) {
        let bId = b._id || b.id || b.batchId, bName = b.name || b.batchName || b.title || "Course", isFav = favs.includes(bId);
        let bImage = b.previewImage || b.thumbnail || FALLBACK_IMG;
        return `<div class="batch" data-id="${bId}"><button class="favorite-btn ${isFav ? "favorited" : ""}">${isFav ? "❤️" : "♡"}</button><div class="batch-name">${bName}</div><div class="batch-thumbnail"><img loading="lazy" src="${bImage}" onerror="this.src='${FALLBACK_IMG}'"></div><button class="explore-btn" data-id="${bId}">Explore</button></div>`;
      }
      function loadMore(reset = false) {
        if(loading) return; loading = true;
        if(reset) { total.innerHTML = ""; loaded = 0; }
        let slice = filtered.slice(loaded, loaded + LIMIT);
        total.innerHTML += slice.map(card).join("");
        loaded += LIMIT; loading = false;
      }
      function renderFav() {
        let items = favs.map(id => cachedBatches[id]).filter(Boolean);
        fav.innerHTML = items.length ? items.map(card).join("") : `<div class="empty">No favourites yet ❤️</div>`;
      }
      content.onscroll = () => { if(total.style.display !== "none" && content.scrollTop + content.clientHeight >= content.scrollHeight - 50) loadMore(); };
      document.onclick = (e) => {
        if(e.target.classList.contains("favorite-btn")) {
            let id = e.target.closest(".batch").dataset.id;
            let batch = ALL.find(b => (b._id || b.id || b.batchId) === id);
            if(favs.includes(id)) { favs = favs.filter(f => f !== id); delete cachedBatches[id]; }
            else { favs.push(id); if(batch) cachedBatches[id] = batch; }
            localStorage.setItem("favs", JSON.stringify(favs));
            localStorage.setItem("fav_batches", JSON.stringify(cachedBatches));
            e.target.innerHTML = favs.includes(id) ? "❤️" : "♡";
            e.target.classList.toggle("favorited");
            if(fav.style.display === "grid") renderFav();
        }
        if(e.target.classList.contains("explore-btn")) window.location.href = "batches.html?batch_id=" + e.target.dataset.id;
      };
      totalTab.onclick = () => { totalTab.classList.add("active"); favTab.classList.remove("active"); total.style.display = "grid"; fav.style.display = "none"; };
      favTab.onclick = () => { favTab.classList.add("active"); totalTab.classList.remove("active"); total.style.display = "none"; fav.style.display = "grid"; renderFav(); };
      document.getElementById("searchInput").oninput = (e) => { filtered = ALL.filter(b => (b.name || "").toLowerCase().includes(e.target.value.toLowerCase())); loadMore(true); };
    </script>
</body>
</html>
