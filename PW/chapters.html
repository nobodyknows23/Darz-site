<script>
const params = new URLSearchParams(window.location.search);

const bId = params.get("batch_id");
const sId = params.get("subject_id");
const sSlug = params.get("subject_slug") || "subject-slug";
const bName = params.get("batchName") || "Batch";
const sName = params.get("subjectName") || "Subject";

if (!bId || !sId) {
    location.href = "./index.html";
}

document.getElementById("backBtn").onclick = () => history.back();

async function loadChapters() {
    const container = document.getElementById("chaptersContainer");

    try {
        const res = await fetch(
            `/api/PW/all-batches-api3?batch_id=${encodeURIComponent(bId)}&subject_id=${encodeURIComponent(sId)}`
        );

        const data = await res.json();

        console.log("API Response:", data);

        const chapters = data.topics || [];

        if (!chapters.length) {
            container.innerHTML = `
                <div class="text-center text-red-500 py-10">
                    No chapters found
                </div>
            `;
            return;
        }

        container.innerHTML = chapters.map(c => `
            <div
                class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all cursor-pointer flex items-center justify-between"
                onclick="openLectures(
                    '${c.slug}',
                    '${encodeURIComponent(c.name)}',
                    '${c._id}'
                )"
            >
                <span class="text-sm font-bold text-slate-700">
                    ${c.name}
                </span>

                <span class="text-indigo-500 font-bold">
                    →
                </span>
            </div>
        `).join("");

    } catch (err) {
        console.error(err);

        container.innerHTML = `
            <div class="text-center text-red-500 py-10">
                Failed to load chapters
            </div>
        `;
    }
}

function openLectures(slug, name, tag) {

    const url =
        `./lectures.html?` +
        `batchId=${encodeURIComponent(bId)}` +
        `&batchName=${encodeURIComponent(bName)}` +
        `&subjectId=${encodeURIComponent(sId)}` +
        `&subjectSlug=${encodeURIComponent(sSlug)}` +
        `&subjectName=${encodeURIComponent(sName)}` +
        `&chapterSlug=${slug}` +
        `&chapterName=${name}` +
        `&tag=${encodeURIComponent(tag)}`;

    console.log("Opening:", url);

    location.href = url;
}

loadChapters();
</script>
