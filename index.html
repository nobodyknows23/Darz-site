<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darz Wallah - Classroom</title>

   <link rel="stylesheet" href="style.css">
   
    <style type="text/css">* {user-select: auto !important; -webkit-user-select: auto !important;}</style>
</head>

  <body>
    <div class="header">
      Darz Wallah
      <span>PW</span>
    </div>

    <div class="search-section">
      <input id="searchInput" class="search-box" placeholder="Search batches...">
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="totalTab">Total</button>
      <button class="tab-btn" id="favTab">Favourites</button>
    </div>

    <div class="content">
      <div id="total" class="grid"></div>
      <div id="fav" class="grid" style="display: none"></div>
    </div>

    <div class="app-footer">
      Developed by - <span>Unknown</span>
    </div>

    <script>
      const FALLBACK_IMG = "https://darzwallah.vercel.app/pw.png";

      let ALL = [];
      let filtered = [];

      let favs = JSON.parse(localStorage.getItem("favs") || "[]");
      let cachedBatches = JSON.parse(localStorage.getItem("fav_batches") || "{}");

      if (localStorage.getItem("batch_cache")) {
        localStorage.removeItem("batch_cache");
      }

      const total = document.getElementById("total");
      const fav = document.getElementById("fav");
      const content = document.querySelector(".content");

      const totalTab = document.getElementById("totalTab");
      const favTab = document.getElementById("favTab");

      let loaded = 0, LIMIT = 8, loading = false;

      showSkeleton();

      fetch("/api/PW/all-batches-api1.js")
        .then((r) => r.json())
        .then((d) => {
          ALL = d.batches || d.data?.batches || d.data || [];
          filtered = ALL;
          setTimeout(() => { loadMore(true); }, 300);
        })
        .catch(() => {
          ALL = Object.values(cachedBatches);
          filtered = ALL;
          if (ALL.length) {
            loadMore(true);
          } else {
            total.innerHTML = `<div class="empty">Failed to load system clusters</div>`;
          }
        });

      function normalizeText(t) {
        return (t || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
      }

      function tokenize(t) {
        return normalizeText(t).split(/\s+/).map((x) => x.replace(/[^a-z0-9]+/g, "")).filter(Boolean);
      }

      function calcLevenshtein(a, b) {
        if (!a.length) return b.length;
        if (!b.length) return a.length;
        let prev = Array(b.length + 1).fill(0).map((_, i) => i);
        let curr = Array(b.length + 1);
        for (let i = 0; i < a.length; i++) {
          curr[0] = i + 1;
          for (let j = 0; j < b.length; j++) {
            curr[j + 1] = Math.min(curr[j] + 1, prev[j + 1] + 1, prev[j] + (a[i] === b[j] ? 0 : 1));
          }
          [prev, curr] = [curr, prev];
        }
        return prev[b.length];
      }

      function performFuzzySearch(searchTerm, sourceArray) {
        if (!searchTerm) return sourceArray.slice();
        const normalized = normalizeText(searchTerm);
        const tokens = tokenize(searchTerm).filter((t) => t.length >= 1);
        const results = [];

        sourceArray.forEach((batch, idx) => {
          let bName = batch.name || batch.batchName || batch.title || "";
          const batchNorm = normalizeText(bName);
          let score = 0, matchType = "none";

          if (batchNorm === normalized) {
            score = 1000;
            matchType = "exact";
          } else if (batchNorm.includes(normalized)) {
            score = 500;
            matchType = "substring";
          } else {
            const batchTokens = tokenize(bName).filter((t) => t.length >= 1);
            if (!batchTokens.length || !tokens.length) return;
            let totalScore = 0, matched = 0, exactMatches = 0;

            tokens.forEach((st) => {
              let best = 0, foundExact = false;
              batchTokens.forEach((bt) => {
                if (bt === st) { foundExact = true; best = 100; }
                else if (bt.includes(st) && st.length >= 2) best = Math.max(best, 85);
                else if (st.includes(bt) && bt.length >= 2) best = Math.max(best, 75);
                else {
                  const mx = Math.max(st.length, bt.length);
                  const sim = ((mx - calcLevenshtein(st, bt)) / mx) * 100;
                  if (sim > best) best = sim;
                }
              });
              if (best >= 40) { totalScore += best; matched++; if (foundExact) exactMatches++; }
            });

            if (matched > 0) {
              const avg = totalScore / tokens.length;
              const matchRatio = matched / tokens.length;
              if (avg >= 55) {
                score = avg * matchRatio * 10;
                if (exactMatches > 0) score += exactMatches * 50;
                if (matchRatio === 1) score += 100;
                matchType = "fuzzy";
              }
            }
          }

          if (matchType !== "none") {
            results.push({ batch, score: Math.round(score), index: idx, matchType });
          }
        });

        results.sort((a, b) => {
          if (a.matchType !== b.matchType) {
            const order = { exact: 0, substring: 1, fuzzy: 2 };
            return order[a.matchType] - order[b.matchType];
          }
          return b.score - a.score || a.index - b.index;
        });
        return results.map((r) => r.batch);
      }

      function getAccent(b) {
        return "#4f46e5";
      }

      function showSkeleton() {
        let skel = "";
        for (let i = 0; i < 6; i++) {
          skel += `
        <div class="skeleton">
            <div class="skel skel-title"></div>
            <div class="skel skel-img"></div>
            <div class="skel skel-text"></div>
            <div class="skel skel-text" style="width:60%"></div>
            <div class="skel skel-text" style="width:40%"></div>
            <div class="skel skel-btn"></div>
        </div>`;
        }
        total.innerHTML = skel;
      }

      function card(b) {
        let bId = b._id || b.id || b.batchId;
        let isFav = favs.includes(bId);
        let bName = b.name || b.batchName || b.title || "Premium Course Allocation";
        let bBy = b.byName || "Classroom Node";
        let bLang = b.language || "Hinglish";
        let bStart = b.startDate || "Active Slot";
        let bEnd = b.endDate || "Ongoing";
        let bPrice = b.feeTotal || b.price;
        let finalPrice = bPrice === 0 || b.isFree ? "Free" : `₹ ${bPrice}`;

        let bImage = FALLBACK_IMG;
        if (b.previewImage && b.previewImage !== "/pwbatch.png") {
          bImage = b.previewImage;
        } else if (b.thumbnail && b.thumbnail !== "/pwbatch.png") {
          bImage = b.thumbnail;
        } else if (b.imageId?.baseUrl && b.imageId?.key) {
          bImage = b.imageId.baseUrl + b.imageId.key;
        }

        return `
    <div class="batch" data-id="${bId}" style="--accent:${getAccent(b)}">
        <button class="favorite-btn ${isFav ? "favorited" : ""}">
            ${isFav ? "❤️" : "♡"}
        </button>
        <div class="batch-name">${bName}</div>
        <div class="batch-thumbnail">
            <img loading="lazy" src="${bImage}" onerror="this.src='${FALLBACK_IMG}'">
        </div>
        <div class="batch-info">👨‍🎓 ${bBy}</div>
        <div class="batch-info">🗣️ ${bLang}</div>
        <div class="batch-info">🗓️ ${bStart} → ${bEnd}</div>
        <div class="batch-price">${finalPrice}</div>
        <button class="explore-btn" data-id="${bId}">Explore</button>
    </div>`;
      }

      function loadMore(reset = false) {
        if (loading) return;
        loading = true;
        if (reset) { total.innerHTML = ""; loaded = 0; }
        let slice = filtered.slice(loaded, loaded + LIMIT);
        if (!slice.length && loaded === 0) {
          total.innerHTML = `<div class="empty">No batches found</div>`;
          loading = false;
          return;
        }
        total.innerHTML += slice.map(card).join("");
        loaded += LIMIT;
        loading = false;
      }

      content.addEventListener("scroll", () => {
        if (total.style.display === "none") return;
        if (content.scrollTop + content.clientHeight >= content.scrollHeight - 50) {
          loadMore();
        }
      });

      document.addEventListener("click", (e) => {
        if (e.target.classList.contains("favorite-btn")) {
          let id = e.target.closest(".batch").dataset.id;
          let batch = ALL.find((b) => (b._id || b.id || b.batchId) === id);

          if (favs.includes(id)) {
            favs = favs.filter((f) => f !== id);
            delete cachedBatches[id];
          } else {
            favs.push(id);
            if (batch) {
              cachedBatches[id] = batch;
            } else if (!cachedBatches[id]) {
              fetch("/api/PW/all-batches-api1.js")
                .then((r) => r.json())
                .then((d) => {
                  let list = d.batches || d.data?.batches || d.data || [];
                  let found = list.find((b) => (b._id || b.id || b.batchId) === id);
                  if (found) {
                    cachedBatches[id] = found;
                    localStorage.setItem("fav_batches", JSON.stringify(cachedBatches));
                  }
                });
            }
          }

          localStorage.setItem("favs", JSON.stringify(favs));
          localStorage.setItem("fav_batches", JSON.stringify(cachedBatches));

          document.querySelectorAll(`.batch[data-id="${id}"] .favorite-btn`).forEach((btn) => {
              btn.classList.toggle("favorited", favs.includes(id));
              btn.innerHTML = favs.includes(id) ? "❤️" : "♡";
          });

          if (fav.style.display === "grid") { renderFav(); }
        }

        if (e.target.classList.contains("explore-btn")) {
          let id = e.target.dataset.id;
          window.location.href = "PW/batches.html?batch_id=" + id;
        }
      });

      function setActive(tab) {
        totalTab.classList.remove("active");
        favTab.classList.remove("active");
        tab.classList.add("active");
      }

      totalTab.onclick = () => {
        setActive(totalTab);
        total.style.display = "grid";
        fav.style.display = "none";
      };

      favTab.onclick = () => {
        setActive(favTab);
        total.style.display = "none";
        fav.style.display = "grid";
        renderFav();
      };

      function renderFav() {
        let items = favs.map((id) => cachedBatches[id]).filter(Boolean);
        fav.innerHTML = items.length
          ? items.map(card).join("")
          : `<div class="empty">No favourites yet ❤️</div>`;
      }

      document.getElementById("searchInput").oninput = function () {
        let q = this.value.trim();
        content.scrollTo({ top: 0, behavior: "smooth" });
        filtered = performFuzzySearch(q, ALL);
        loadMore(true);
      };
    </script>
</body>
</html>
